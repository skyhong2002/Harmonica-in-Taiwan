name: 修正既有資料
description: 修正名稱、分類、地區、連結、顯示方式或公開資料內容
title: "[資料修正] "
body:
  - type: markdown
    attributes:
      value: |
        謝謝你幫忙修正資料。請只提供公開可查的資訊；GitHub issue 會公開顯示，不要放私人電話、私人信箱、未公開群組連結、會員資料或憑證。

  - type: input
    id: target_name
    attributes:
      label: 要修正的名稱或標題
      description: 請填網站上目前看到的名稱、來源、活動或頁面標題。
      placeholder: 例：某某大學口琴社
    validations:
      required: true

  - type: input
    id: source_url
    attributes:
      label: 公開來源 URL
      description: 請放能證明正確資訊的官方網站、公開社群頁、公開貼文或活動頁。
      placeholder: https://...
    validations:
      required: true

  - type: textarea
    id: desired_result
    attributes:
      label: 希望網站最後怎麼呈現
      description: 請清楚寫出目前錯在哪裡，以及建議改成什麼。
      placeholder: |
        - 目前網站上的資料：
        - 建議修正為：
        - 原因或公開證據：
    validations:
      required: true

  - type: dropdown
    id: public_surface
    attributes:
      label: Agent 判斷：資料應改到哪個公開表面
      description: 如果不確定，請選最接近的項目，agent 會再確認。
      options:
        - 資料索引 /api/sources.json
        - 首頁最新河道 /api/latest.json
        - RSS 或分類 API
        - 網站靜態頁面文字
        - 不確定，請 agent 判斷
    validations:
      required: true

  - type: dropdown
    id: evidence_status
    attributes:
      label: Agent 判斷：是否有足夠公開證據
      options:
        - 有，主要 URL 足以判斷
        - 有，還需要搭配下方補充來源
        - 不確定，請 agent 查證
    validations:
      required: true

  - type: input
    id: verification_target
    attributes:
      label: 完成後要驗證的頁面或 API
      description: 可填目前錯誤出現的網站頁面、API 或搜尋關鍵字；不知道就寫「請 agent 判斷」。
      placeholder: 例：https://harmonica.observe.tw/directory/
    validations:
      required: true

  - type: textarea
    id: extra_sources
    attributes:
      label: 補充公開來源（選填）
      description: 可放更多公開證據或目前錯誤出現的位置。
      placeholder: https://...
    validations:
      required: false

  - type: checkboxes
    id: public_confirmation
    attributes:
      label: 公開資料確認
      options:
        - label: 我了解這個 issue 會公開顯示，且沒有提供私人或不應公開的資料。
          required: true
