name: 資料回報與補充
description: 回報臺灣口琴觀測站的公開資料缺漏、錯誤、失效連結或新增來源
title: "[資料回報] "
body:
  - type: markdown
    attributes:
      value: |
        謝謝你幫忙維護資料。請只提供公開可查的資訊；GitHub issue 會公開顯示，不要放私人電話、私人信箱、未公開群組連結或任何不方便公開的資料。

  - type: input
    id: request_type
    attributes:
      label: 回報類型
      description: 由網站回報頁預先帶入；也可以手動填寫。
      placeholder: 例：新增來源或社團
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: 名稱或標題
      description: 例如社團、樂團、演奏者、活動、比賽或補助名稱。
      placeholder: 例：某某大學口琴社
    validations:
      required: true

  - type: input
    id: source_url
    attributes:
      label: 公開來源連結
      description: 請放官方網站、公開社群頁、公開貼文、公開活動頁或其他公開來源連結。
      placeholder: https://...
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: 要新增或修正的內容
      description: 請寫清楚目前資料哪裡需要改，或希望新增哪些欄位。
      placeholder: |
        例：
        - 類型：學生社團
        - 城市：新竹市
        - 建議分類：學生社團／實體活動／補助比賽／貼文影片
        - 目前網站上的資料錯在：
        - 建議改成：
    validations:
      required: true

  - type: textarea
    id: public_contact
    attributes:
      label: 公開聯絡方式（選填）
      description: 只填願意公開顯示的聯絡方式；不確定就留空。
      placeholder: 例：公開網站聯絡頁、官方社群私訊入口。
    validations:
      required: false

  - type: checkboxes
    id: public_confirmation
    attributes:
      label: 公開資料確認
      options:
        - label: 我了解這個 issue 會公開顯示，且沒有提供私人或不應公開的資料。
          required: true
