name: 新增來源或社團
description: 新增學校社團、樂團、演奏者、教學單位、場館或公開社群來源
title: "[新增來源] "
body:
  - type: markdown
    attributes:
      value: |
        謝謝你補充資料。請只提供公開可查的資訊；GitHub issue 會公開顯示，不要放私人電話、私人信箱、未公開群組連結、會員資料或憑證。

  - type: input
    id: target_name
    attributes:
      label: 要新增的名稱
      description: 社團、樂團、演奏者、教學單位、場館、活動平台或公開來源名稱。
      placeholder: 例：某某大學口琴社
    validations:
      required: true

  - type: input
    id: source_url
    attributes:
      label: 主要公開來源 URL
      description: 請放最能證明這個來源存在且適合收錄的官方網站、公開社群頁或公開頻道。
      placeholder: https://...
    validations:
      required: true

  - type: textarea
    id: desired_result
    attributes:
      label: 希望網站最後怎麼呈現
      description: 請寫出建議名稱、分類、地區、公開連結，以及是否希望被納入公開更新監看。
      placeholder: |
        - 建議名稱：
        - 類型：學生社團／樂團／演奏者／教學單位／場館／活動平台
        - 地區：
        - 公開連結：
        - 是否需要監看公開更新：
    validations:
      required: true

  - type: dropdown
    id: public_surface
    attributes:
      label: Agent 判斷：資料應改到哪個公開表面
      description: 如果不確定，請選最接近的項目，agent 會再確認。
      options:
        - 資料索引 /api/sources.json
        - 首頁最新河道 /api/latest.json
        - RSS 或分類 API
        - 不確定，請 agent 判斷
    validations:
      required: true

  - type: dropdown
    id: evidence_status
    attributes:
      label: Agent 判斷：是否有足夠公開證據
      options:
        - 有，主要 URL 足以判斷
        - 有，還需要搭配下方補充來源
        - 不確定，請 agent 查證
    validations:
      required: true

  - type: input
    id: verification_target
    attributes:
      label: 完成後要驗證的頁面或 API
      description: 可填網站頁面、API 或搜尋關鍵字；不知道就寫「請 agent 判斷」。
      placeholder: 例：https://harmonica.observe.tw/directory/
    validations:
      required: true

  - type: textarea
    id: extra_sources
    attributes:
      label: 補充公開來源（選填）
      description: 可放其他公開網站、公開社群頁、公開貼文、YouTube 頻道或活動頁。
      placeholder: https://...
    validations:
      required: false

  - type: checkboxes
    id: public_confirmation
    attributes:
      label: 公開資料確認
      options:
        - label: 我了解這個 issue 會公開顯示，且沒有提供私人或不應公開的資料。
          required: true
