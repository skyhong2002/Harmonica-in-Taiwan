name: 移除或停止收錄
description: 回報失效連結、停止公開、重複資料，或不適合繼續收錄的來源
title: "[停止收錄] "
body:
  - type: markdown
    attributes:
      value: |
        謝謝你回報停止收錄。請只提供公開可查的資訊；GitHub issue 會公開顯示，不要放私人電話、私人信箱、未公開群組連結、會員資料或憑證。

  - type: input
    id: target_name
    attributes:
      label: 要移除或停止收錄的名稱
      description: 請填網站上目前看到的來源、社團、活動或頁面標題。
      placeholder: 例：某某大學口琴社
    validations:
      required: true

  - type: input
    id: source_url
    attributes:
      label: 公開來源 URL
      description: 請放目前失效、停用、重複，或能證明應停止收錄的公開頁面。
      placeholder: https://...
    validations:
      required: true

  - type: textarea
    id: desired_result
    attributes:
      label: 希望網站最後怎麼呈現
      description: 請說明希望移除、改成停用狀態、合併到其他來源，或只停止監看公開更新。
      placeholder: |
        - 建議處理：移除／標記停用／合併／停止監看
        - 理由：
        - 若要合併，目標來源是：
    validations:
      required: true

  - type: dropdown
    id: public_surface
    attributes:
      label: Agent 判斷：資料應改到哪個公開表面
      description: 如果不確定，請選最接近的項目，agent 會再確認。
      options:
        - 資料索引 /api/sources.json
        - 首頁最新河道 /api/latest.json
        - RSS 或分類 API
        - 公開來源監看設定
        - 不確定，請 agent 判斷
    validations:
      required: true

  - type: dropdown
    id: evidence_status
    attributes:
      label: Agent 判斷：是否有足夠公開證據
      options:
        - 有，主要 URL 足以判斷
        - 有，還需要搭配下方補充來源
        - 不確定，請 agent 查證
    validations:
      required: true

  - type: input
    id: verification_target
    attributes:
      label: 完成後要驗證的頁面或 API
      description: 可填目前資料出現的網站頁面、API 或搜尋關鍵字；不知道就寫「請 agent 判斷」。
      placeholder: 例：https://harmonica.observe.tw/directory/
    validations:
      required: true

  - type: textarea
    id: extra_sources
    attributes:
      label: 補充公開來源（選填）
      description: 可放更多公開證據、替代來源或合併目標。
      placeholder: https://...
    validations:
      required: false

  - type: checkboxes
    id: public_confirmation
    attributes:
      label: 公開資料確認
      options:
        - label: 我了解這個 issue 會公開顯示，且沒有提供私人或不應公開的資料。
          required: true
